<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вращающееся фото на весь экран</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
        }
        img {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            display: block;
            animation: spin 3s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <img src="image.png" alt="photo" onerror="this.src='https://via.placeholder.com/1920x1080?text=image.png+не+найден'">
</body>
</html>
